# cat roles.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: default
  namespace: byoh
rules:
- apiGroups: ["infrastructure.cluster.x-k8s.io", "infrastructure.cluster.x-k8s.io/v1beta1"]
  resources: ["byohosts", "byohost"]
  verbs: ["create", "update", "get", "list", "watch", "delete", "patch"]
- apiGroups: ["infrastructure.cluster.x-k8s.io", "infrastructure.cluster.x-k8s.io/v1beta1"]
  resources: ["byohosts/status", "byohost/status"]
  verbs: ["patch", "update"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
---
# cat rolebinding.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: default-binding
  namespace: byoh
subjects:
- kind: ServiceAccount
  name: default
  namespace: byoh
roleRef:
  kind: Role
  name: default
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: byo-manager
rules:
- apiGroups: ["infrastructure.cluster.x-k8s.io", "infrastructure.cluster.x-k8s.io/v1beta1"]
  resources: ["byohosts", "byohost"]
  verbs: ["create", "update", "get", "list", "watch", "delete", "patch"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: byohosts-clusterrolebinding
subjects:
- kind: ServiceAccount
  name: default
  namespace: byoh
roleRef:
  kind: ClusterRole
  name: byo-manager
  apiGroup: rbac.authorization.k8s.io
---
