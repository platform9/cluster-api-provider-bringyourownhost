version: "2"
run:
  timeout: 10m
linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - dupword
    - errcheck
    - funlen
    - goconst
    - gocritic
    - gocyclo
    - goheader
    - goprintffuncname
    - gosec
    - govet
    - ineffassign
    - misspell
    - mnd
    - nakedret
    - noctx
    - rowserrcheck
    - staticcheck
    - testpackage
    - unconvert
    - unused
    - whitespace
  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          allow:
            - $gostd
            - k8s.io/client-go/plugin/pkg/client/auth
    dupl:
      threshold: 200
    funlen:
      lines: 100
      statements: 50
    goconst:
      min-len: 2
      min-occurrences: 3
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 18
    goheader:
      values:
        const:
          COMPANY: VMware, Inc.
          LICENSE: Apache-2.0
        regexp:
          YEAR: 20\d*-*\d*
      template: |-
        Copyright {{ YEAR }} {{ COMPANY }} All Rights Reserved.
        SPDX-License-Identifier: {{ LICENSE }}
    govet:
      enable:
        - shadow
    gosec:
      excludes:
        - G115
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-functions:
        - log.*
      ignored-numbers:
        - "2"
    nolintlint:
      require-explanation: false
      require-specific: false
      allow-unused: false
    whitespace:
      multi-func: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - dupl
          - gosec
        path: _test\.go
      # New files added since the fork from vmware-tanzu don't carry (and
      # shouldn't fabricate) a VMware copyright header.
      - linters:
          - goheader
        path: installer/internal/algo/common_ubuntu_test\.go$
    paths:
      - .*dummy.go
      - .*fakes/
      - third_party$
      - builtin$
      - examples$
formatters:
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/vmware-tanzu
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
