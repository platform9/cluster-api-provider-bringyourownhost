name: Build and Publish Agent Bundle

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Report pending commit status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: bash .ci/report-commit-status.sh pending build-push-agent-bundle "Agent bundle build in progress"

      - name: Download agent binary artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: byoh-hostagent-linux-amd64
          path: bin
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Install fpm build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm

      - name: Log in to Quay
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Print tag
        run: make tag

      - name: Build and push agent deb bundle
        env:
          SKIP_BUILD: ${{ github.event_name == 'workflow_run' && '1' || '' }}
        run: bash .ci/build-push-agent-deb.sh

      - name: Report final commit status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: bash .ci/report-commit-status.sh "${{ job.status == 'success' && 'success' || 'failure' }}" build-push-agent-bundle "Agent bundle build ${{ job.status }}"
