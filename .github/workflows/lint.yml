name: golangci-lint

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
      - 'PROJECT'
      - 'SECURITY_CONTACTS'
  push:
    branches: [ main ]

jobs:
  golangci:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Go 1.26.2
      uses: actions/setup-go@v6
      with:
        go-version: 1.26.2

    - name: go vet
      run: make vet

    - name: gofmt check
      run: |
        make fmt
        if ! git diff --exit-code; then
          echo "::error::Code is not gofmt-clean. Run 'make fmt' and commit the result."
          exit 1
        fi

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2
