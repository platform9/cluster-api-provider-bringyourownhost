---
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: ${CLUSTER_NAME}
  labels:
    cni: ${CLUSTER_NAME}-crs-0
    crs: "true"
spec:
  clusterNetwork:
    services:
      cidrBlocks: ["10.128.0.0/12"]
    pods:
      cidrBlocks: ["192.168.0.0/16"]
    serviceDomain: "cluster.local"
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: ByoCluster
    name: ${CLUSTER_NAME}
  controlPlaneRef:
    kind: KubeadmControlPlane
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    name: "${CLUSTER_NAME}-control-plane"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: ByoCluster
metadata:
  name: ${CLUSTER_NAME}
spec:
  bundleLookupBaseRegistry: quay.io/platform9
  controlPlaneEndpoint:
    host: ${CONTROL_PLANE_ENDPOINT_IP}
    port: 6443
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: ByoMachineTemplate
metadata:
  name: "${CLUSTER_NAME}-control-plane"
spec:
  template:
    spec:
      installerRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: K8sInstallerConfigTemplate
        name: "${CLUSTER_NAME}-control-plane"
        namespace: "${NAMESPACE}"
---
kind: KubeadmControlPlane
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
metadata:
  name: "${CLUSTER_NAME}-control-plane"
  labels:
    nodepool: "pool0"
spec:
  replicas: ${CONTROL_PLANE_MACHINE_COUNT}
  machineTemplate:
    infrastructureRef:
      kind: ByoMachineTemplate
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      name: "${CLUSTER_NAME}-control-plane"
      namespace: "${NAMESPACE}"
    # Deleting a control-plane Machine's etcd member briefly disrupts the
    # workload API (kube-vip fails over, that node's own apiserver/etcd shut
    # down). CAPI's Node-deletion retry budget defaults to 10s
    # (NodeDeletionTimeoutSeconds), which can be shorter than that failover
    # blip -- when it is, CAPI gives up on deleting the old Node and finishes
    # deleting the Machine anyway, leaving a stale Node (and its mirrored
    # static pods, e.g. etcd) behind forever. Give it more retries/time.
    nodeDeletionTimeout: 60s
  kubeadmConfigSpec:
    # kube-proxy's conntrack tuning tries to raise net.netfilter.nf_conntrack_max,
    # a global (non-namespaced) sysctl a privileged container can read but never
    # write -- crash-looping with "permission denied" regardless of the host's
    # own value. CAPI's KubeadmControlPlane has no field for KubeProxyConfiguration
    # (kubernetes-sigs/cluster-api#4512), so append one to kubeadm's own config
    # file before it runs, disabling the tuning kubeadm would otherwise bake into
    # the kube-proxy ConfigMap it creates.
    preKubeadmCommands:
      - |
        cat <<'EOF' >> /run/kubeadm/kubeadm.yaml
        ---
        apiVersion: kubeproxy.config.k8s.io/v1alpha1
        kind: KubeProxyConfiguration
        conntrack:
          maxPerCore: 0
        EOF
      # Every byohost container's /etc/resolv.conf points at Docker's embedded
      # per-container DNS proxy (127.0.0.11), which loops back to the pod's own
      # CoreDNS instance and fatals CoreDNS's self-check ("plugin/loop"). Write
      # a separate resolv-conf with a real nameserver and point kubelet at it
      # (see kubeletExtraArgs.resolv-conf below), leaving the node's own
      # /etc/resolv.conf untouched.
      - |
        cat <<'EOF' > /etc/kubernetes/resolv.conf
        nameserver 8.8.8.8
        nameserver 8.8.4.4
        EOF
    # kubeadm init creates super-admin.conf; kubeadm join --control-plane does
    # not. kube-vip's static pod needs this file on every control-plane node,
    # so it crash-loops on any node added after the first one.
    #
    # This line does nothing on the init node (file already has content).
    # On a join node, it deletes the empty placeholder that kubelet's
    # FileOrCreate volume leaves behind and generates the real file locally
    # -- a joining control-plane node already has the CA cert+key needed to
    # do that itself.
    postKubeadmCommands:
      - "[[ -s /etc/kubernetes/super-admin.conf ]] || { rm -f /etc/kubernetes/super-admin.conf && kubeadm init phase kubeconfig super-admin; }"
    clusterConfiguration:
      controllerManager:
        extraArgs: {enable-hostpath-provisioner: 'true'}
      apiServer:
        certSANs: [localhost, 127.0.0.1, 0.0.0.0, host.docker.internal]
    files:
    - content: |
        apiVersion: v1
        kind: Pod
        metadata:
          creationTimestamp: null
          name: kube-vip
          namespace: kube-system
        spec:
          containers:
          - args:
            - manager
            env:
            - name: cp_enable
              value: "true"
            - name: vip_arp
              value: "true"
            - name: vip_leaderelection
              value: "true"
            - name: vip_address
              value: ${CONTROL_PLANE_ENDPOINT_IP}
            - name: vip_interface
              value: {{ .DefaultNetworkInterfaceName }}
            - name: vip_leaseduration
              value: "15"
            - name: vip_renewdeadline
              value: "10"
            - name: vip_retryperiod
              value: "2"
            image: ghcr.io/kube-vip/kube-vip:v0.5.0
            imagePullPolicy: IfNotPresent
            name: kube-vip
            resources: {}
            securityContext:
              capabilities:
                add:
                - NET_ADMIN
                - NET_RAW
            volumeMounts:
            - mountPath: /etc/kubernetes/admin.conf
              name: kubeconfig
          hostNetwork: true
          hostAliases:
            - hostnames:
                - kubernetes
              ip: 127.0.0.1
          volumes:
          - hostPath:
              path: /etc/kubernetes/super-admin.conf
              type: FileOrCreate
            name: kubeconfig
        status: {}
      owner: root:root
      path: /etc/kubernetes/manifests/kube-vip.yaml
    initConfiguration:
      nodeRegistration:
        ignorePreflightErrors:
        - Swap
        - SystemVerification
        - DirAvailable--etc-kubernetes-manifests
        - FileAvailable--etc-kubernetes-kubelet.conf
        criSocket: /var/run/containerd/containerd.sock
        kubeletExtraArgs:
          cgroup-driver: systemd
          eviction-hard: nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%
          resolv-conf: /etc/kubernetes/resolv.conf
    joinConfiguration:
      nodeRegistration:
        ignorePreflightErrors:
        - Swap
        - SystemVerification
        - DirAvailable--etc-kubernetes-manifests
        - FileAvailable--etc-kubernetes-kubelet.conf
        criSocket: /var/run/containerd/containerd.sock
        kubeletExtraArgs:
          cgroup-driver: systemd
          eviction-hard: nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%
          resolv-conf: /etc/kubernetes/resolv.conf
  version: ${KUBERNETES_VERSION}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: K8sInstallerConfigTemplate
metadata:
  name: ${CLUSTER_NAME}-control-plane
spec:
  template:
    spec:
      bundleRepo: quay.io/platform9
      bundleType: k8s
