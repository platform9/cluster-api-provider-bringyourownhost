---
apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: quickstart
spec:
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: KubeadmControlPlaneTemplate
      name: quickstart-control-plane
    machineInfrastructure:
      ref:
        kind: ByoMachineTemplate
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        name: quickstart-control-plane-machine
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: ByoClusterTemplate
      name: quickstart-cluster
  workers:
    machineDeployments:
      - class: quickstart-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
              kind: KubeadmConfigTemplate
              name: quickstart-worker-bootstrap-template
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
              kind: ByoMachineTemplate
              name: quickstart-worker-machinetemplate
  variables:
    - name: bundleLookupBaseRegistry
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "https://quay.io/platform9"
    - name: controlPlaneIpAddr
      required: true
      schema:
        openAPIV3Schema:
          type: string
    - name: kubeVipPodManifest
      required: true
      schema:
        openAPIV3Schema:
          description: kube-vip manifest for the control plane.
          type: string
    - name: coreDNSImageTag
      required: true
      schema:
        openAPIV3Schema:
          type: string
          default: "v1.11.1"
  patches:
    - name: bundleLookupBaseRegistry
      description: "Sets the bundleLookupBaseRegistry used for the BYOCluster."
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: ByoClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: "/spec/template/spec/bundleLookupBaseRegistry"
              valueFrom:
                variable: bundleLookupBaseRegistry
    - name: controlPlaneEndpoint
      description: "Sets control plane endpoint"
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: ByoClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: "/spec/template/spec/controlPlaneEndpoint"
              valueFrom:
                template: |
                  host: '{{ .controlPlaneIpAddr }}'
                  port: 6443
    - name: kubeVipEnabled
      definitions:
        - jsonPatches:
            - op: add
              path: /spec/template/spec/kubeadmConfigSpec/files/0/content
              valueFrom:
                variable: kubeVipPodManifest
          selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1beta1
            kind: KubeadmControlPlaneTemplate
            matchResources:
              controlPlane: true
    - name: coreDNSImageTag
      description: "Sets the CoreDNS image tag so CAPI's upgrade test helper can patch it."
      definitions:
        - selector:
            apiVersion: controlplane.cluster.x-k8s.io/v1beta1
            kind: KubeadmControlPlaneTemplate
            matchResources:
              controlPlane: true
          jsonPatches:
            - op: replace
              path: "/spec/template/spec/kubeadmConfigSpec/clusterConfiguration/dns/imageTag"
              valueFrom:
                variable: coreDNSImageTag
---
kind: KubeadmControlPlaneTemplate
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
metadata:
  name: quickstart-control-plane
spec:
  template:
    spec:
      # Deleting a control-plane Machine's etcd member briefly disrupts the
      # workload API (kube-vip fails over, that node's own apiserver/etcd shut
      # down). CAPI's Node-deletion retry budget defaults to 10s
      # (NodeDeletionTimeoutSeconds), which can be shorter than that failover
      # blip -- when it is, CAPI gives up on deleting the old Node and finishes
      # deleting the Machine anyway, leaving a stale Node (and its mirrored
      # static pods, e.g. etcd) behind forever. Give it more retries/time.
      machineTemplate:
        nodeDeletionTimeout: 60s
      kubeadmConfigSpec:
        # kube-proxy's conntrack tuning tries to raise net.netfilter.nf_conntrack_max,
        # a global (non-namespaced) sysctl a privileged container can read but never
        # write -- crash-looping with "permission denied" regardless of the host's
        # own value. CAPI's KubeadmControlPlane has no field for KubeProxyConfiguration
        # (kubernetes-sigs/cluster-api#4512), so append one to kubeadm's own config
        # file before it runs, disabling the tuning kubeadm would otherwise bake into
        # the kube-proxy ConfigMap it creates.
        preKubeadmCommands:
          - |
            cat <<'EOF' >> /run/kubeadm/kubeadm.yaml
            ---
            apiVersion: kubeproxy.config.k8s.io/v1alpha1
            kind: KubeProxyConfiguration
            conntrack:
              maxPerCore: 0
            EOF
          # Every byohost container's /etc/resolv.conf points at Docker's embedded
          # per-container DNS proxy (127.0.0.11), which loops back to the pod's own
          # CoreDNS instance and fatals CoreDNS's self-check ("plugin/loop"). Write
          # a separate resolv-conf with a real nameserver and point kubelet at it
          # (see kubeletExtraArgs.resolv-conf below), leaving the node's own
          # /etc/resolv.conf untouched.
          - |
            cat <<'EOF' > /etc/kubernetes/resolv.conf
            nameserver 8.8.8.8
            nameserver 8.8.4.4
            EOF
        # kubeadm init creates super-admin.conf; kubeadm join --control-plane does
        # not. kube-vip's static pod needs this file on every control-plane node,
        # so it crash-loops on any node added after the first one.
        #
        # This line does nothing on the init node (file already has content).
        # On a join node, it deletes the empty placeholder that kubelet's
        # FileOrCreate volume leaves behind and generates the real file locally
        # -- a joining control-plane node already has the CA cert+key needed to
        # do that itself.
        postKubeadmCommands:
          - "[[ -s /etc/kubernetes/super-admin.conf ]] || { rm -f /etc/kubernetes/super-admin.conf && kubeadm init phase kubeconfig super-admin; }"
        clusterConfiguration:
          apiServer:
            certSANs:
              - localhost
              - 127.0.0.1
              - 0.0.0.0
              - host.docker.internal
          controllerManager:
            extraArgs:
              enable-hostpath-provisioner: "true"
          dns:
            imageTag: v1.11.1
        files:
          - owner: root:root
            path: /etc/kubernetes/manifests/kube-vip.yaml
        initConfiguration:
          nodeRegistration:
            criSocket: /var/run/containerd/containerd.sock
            ignorePreflightErrors:
              - Swap
              - SystemVerification
              - DirAvailable--etc-kubernetes-manifests
              - FileAvailable--etc-kubernetes-kubelet.conf
            kubeletExtraArgs:
              cgroup-driver: systemd
              eviction-hard: nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%
              resolv-conf: /etc/kubernetes/resolv.conf
        joinConfiguration:
          nodeRegistration:
            criSocket: /var/run/containerd/containerd.sock
            ignorePreflightErrors:
              - Swap
              - SystemVerification
              - DirAvailable--etc-kubernetes-manifests
              - FileAvailable--etc-kubernetes-kubelet.conf
            kubeletExtraArgs:
              cgroup-driver: systemd
              eviction-hard: nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%
              resolv-conf: /etc/kubernetes/resolv.conf
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: ByoMachineTemplate
metadata:
  name: quickstart-control-plane-machine
spec:
  template:
    spec:
      installerRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: K8sInstallerConfigTemplate
        name: quickstart-control-plane-machine
        namespace: ${NAMESPACE}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: K8sInstallerConfigTemplate
metadata:
  name: quickstart-control-plane-machine
spec:
  template:
    spec:
      bundleRepo: quay.io/platform9
      bundleType: k8s
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: ByoClusterTemplate
metadata:
  name: quickstart-cluster
spec:
  template:
    spec: {}
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: quickstart-worker-bootstrap-template
spec:
  template:
    spec:
      # Every byohost container's /etc/resolv.conf points at Docker's embedded
      # per-container DNS proxy (127.0.0.11), which loops back to the pod's own
      # CoreDNS instance and fatals CoreDNS's self-check ("plugin/loop"). Write
      # a separate resolv-conf with a real nameserver and point kubelet at it
      # (see kubeletExtraArgs.resolv-conf below), leaving the node's own
      # /etc/resolv.conf untouched.
      preKubeadmCommands:
        - |
          cat <<'EOF' > /etc/kubernetes/resolv.conf
          nameserver 8.8.8.8
          nameserver 8.8.4.4
          EOF
      joinConfiguration:
        nodeRegistration:
          ignorePreflightErrors:
            - Swap
            - SystemVerification
            - DirAvailable--etc-kubernetes-manifests
            - FileAvailable--etc-kubernetes-kubelet.conf
          kubeletExtraArgs:
            cgroup-driver: systemd
            eviction-hard: nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%
            resolv-conf: /etc/kubernetes/resolv.conf
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: ByoMachineTemplate
metadata:
  name: quickstart-worker-machinetemplate
spec:
  template:
    spec:
      installerRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: K8sInstallerConfigTemplate
        name: ${CLUSTER_NAME}-md-0
        namespace: ${NAMESPACE}
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: K8sInstallerConfigTemplate
metadata:
  name: ${CLUSTER_NAME}-md-0
spec:
  template:
    spec:
      bundleRepo: quay.io/platform9
      bundleType: k8s
---
apiVersion: v1
binaryData: null
data: ${CNI_RESOURCES}
kind: ConfigMap
metadata:
  name: cni-${CLUSTER_NAME}-crs-0
---
apiVersion: addons.cluster.x-k8s.io/v1beta1
kind: ClusterResourceSet
metadata:
  name: ${CLUSTER_NAME}-crs-0
spec:
  clusterSelector:
    matchLabels:
      cni: ${CLUSTER_NAME}-crs-0
  resources:
    - kind: ConfigMap
      name: cni-${CLUSTER_NAME}-crs-0
  strategy: ApplyOnce
---
